<div class="container">
  <!-- ...existing code, substitua "Login" por "Entrar" se desejado... -->
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card mt-5">
        <div class="card-header">
          <h1>Entrar</h1>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onLogin()">
            <div class="mb-3">
              <label for="username" class="form-label">Usuário</label>
              <input id="username" name="username" type="text" [(ngModel)]="username" required class="form-control">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Senha</label>
              <input id="password" name="password" type="password" [(ngModel)]="password" required class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
